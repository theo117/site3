<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72" role="img" aria-label="WD Awards Nominee 2026">
  <title>WD Awards Nominee 2026</title>
  <!-- Circular badge matching certificate palette -->
  <circle cx="36" cy="36" r="34" fill="#5E2140" stroke="#C8A35F" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="36" cy="36" r="29" fill="none" stroke="rgba(250,245,232,0.2)" stroke-width="1"/>
  <!-- WD monogram -->
  <text x="36" y="28" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="800" fill="#FAF5E8" letter-spacing="1">WD</text>
  <!-- AWARDS label -->
  <text x="36" y="42" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#C8A35F" letter-spacing="1.2">AWARDS</text>
  <!-- NOMINEE label -->
  <text x="36" y="54" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="6.5" font-weight="600" fill="#FAF5E8" letter-spacing="1">NOMINEE</text>
</svg>
